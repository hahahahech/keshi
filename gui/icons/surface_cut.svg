<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
            <feOffset dx="1" dy="1"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    
    <g filter="url(#shadow)">
        <path d="M4 14 C10 4, 22 4, 28 14 L28 22 C22 12, 10 12, 4 22 Z" 
              fill="#42A5F5" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
        
        <g transform="translate(20, 10) rotate(-15)">
            <!-- 剪刀刀片 -->
            <path d="M0 0 L-12 12 M0 0 L-12 -3" stroke="#424242" stroke-width="3" stroke-linecap="round"/>
            <!-- 剪刀手柄 -->
            <circle cx="-14" cy="13" r="4" stroke="#D32F2F" stroke-width="2.5" fill="#FFCDD2"/>
            <circle cx="-14" cy="-4" r="4" stroke="#D32F2F" stroke-width="2.5" fill="#FFCDD2"/>
            <!-- 中心铰链 -->
            <circle cx="0" cy="0" r="2" fill="#616161" stroke="#424242" stroke-width="1"/>
        </g>
        
        <path d="M16 8 L16 24" stroke="#D32F2F" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
</svg>
