<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="layerOrange" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFEB3B" />
            <stop offset="50%" style="stop-color:#FF9800" />
            <stop offset="100%" style="stop-color:#E65100" />
        </linearGradient>
        <linearGradient id="pencilWood" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FFECB3" />
            <stop offset="100%" style="stop-color:#FFCA28" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
            <feOffset dx="1" dy="1"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <g filter="url(#shadow)">
        <path d="M4 24 L12 14 L28 14 L20 24 Z" 
              fill="url(#layerOrange)" stroke="#5D4037" stroke-width="1"/>
    </g>

    <g transform="translate(22, 10) rotate(-45)" filter="url(#shadow)">
        <rect x="-3" y="-10" width="6" height="14" fill="url(#pencilWood)" stroke="#F57F17" stroke-width="0.5"/>
        <rect x="-3" y="-13" width="6" height="3" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
        <line x1="-3" y1="-10" x2="3" y2="-10" stroke="Silver" stroke-width="1"/>
        <path d="M-3 4 L0 8 L3 4 Z" fill="#FFE0B2" stroke="#F57F17" stroke-width="0.5"/>
        <path d="M-1 6.5 L0 8 L1 6.5 Z" fill="#3E2723"/>
