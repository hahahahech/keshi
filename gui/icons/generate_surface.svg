              stroke-width="1"/>
        <path d="M3 25 L10.5 17 L25 17" fill="none" stroke="white" stroke-opacity="0.6" stroke-width="1"/>
    </g>

    <g transform="translate(22, 6)" filter="url(#shadow)">
        <rect x="4" y="0" width="4" height="12" fill="url(#plusGreen)" stroke="#1B5E20" stroke-width="0.5"/>
        <rect x="0" y="4" width="12" height="4" fill="url(#plusGreen)" stroke="#1B5E20" stroke-width="0.5"/>
    </g>
</svg>
